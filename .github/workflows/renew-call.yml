name: HN Host Auto Task

on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * *' 

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Fetch Private Core Code
        env:
          WORKER_ENDPOINT: ${{ secrets.WORKER_ENDPOINT }}
          WORKER_AUTH: ${{ secrets.WORKER_AUTH }}
        run: |
          echo "Connecting to Secure Gateway..."
          
          AUTH_ARRAY=($WORKER_AUTH)
          PROJECT_TOKEN=${AUTH_ARRAY[0]}
          GITHUB_PAT=${AUTH_ARRAY[1]}
          
          CURL_CMD="curl -sSL -H \"x-project-token: $PROJECT_TOKEN\""
          if [ -n "$GITHUB_PAT" ]; then
            CURL_CMD="$CURL_CMD -H \"Authorization: Bearer $GITHUB_PAT\""
          fi
          CURL_CMD="$CURL_CMD \"$WORKER_ENDPOINT\" -o core_code.tar.gz"
          eval $CURL_CMD
          
          if ! gzip -t core_code.tar.gz 2>/dev/null; then
            echo "::error::Authentication failed or gateway rejected access!"
            cat core_code.tar.gz
            exit 1
          fi
          
          mkdir -p temp_core
          tar -xzf core_code.tar.gz -C temp_core --strip-components=1
          rm -rf temp_core/.github
          cp -a temp_core/. ./
          rm -rf temp_core core_code.tar.gz

      - name: Setting up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm install

      - name: Configure Proxy
        run: |
          curl -L -o sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.11/sing-box-1.13.11-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo cp sing-box-1.13.11-linux-amd64/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box

      - name: Run Automated Inspection
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          GITHUB_REPO: ${{ github.repository }}
        run: npm start
        
      - name: Record the last run time.
        if: always()
        run: |
          echo "Last execution time (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')" > time.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git commit -m "📝 Update Runtime Records [skip ci]" || echo "No changes; no submission required."
          git push

      - name: Upload screenshot of the error (if applicable)
        uses: actions/upload-artifact@v4
        if: always()  
        with:
          name: debug-screenshots
          path: '*.png'
          retention-days: 5
